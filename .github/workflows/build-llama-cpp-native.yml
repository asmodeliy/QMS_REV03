name: Build llama.cpp NATIVE (Rocky 8.10)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - uses: actions/checkout@v4

      # -----------------------------
      # Dependencies + Modern GCC
      # -----------------------------
      - name: Install dependencies
        run: |
          dnf -y update
          dnf -y install epel-release
          dnf -y groupinstall "Development Tools"

          # 최신 GCC (Zen3 인식 필수)
          dnf -y install gcc-toolset-13 gcc-toolset-13-gcc gcc-toolset-13-gcc-c++ gcc-toolset-13-libstdc++-devel

          dnf -y install cmake git numactl
          dnf -y install python3.11 python3.11-devel python3.11-pip

      # -----------------------------
      # Build llama.cpp (REAL Native)
      # -----------------------------
      - name: Build llama.cpp for Ryzen 5950X
        run: |
          source /opt/rh/gcc-toolset-13/enable

          cd /tmp
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp

          # Zen3 강제 네이티브
          export CFLAGS="-O3 -march=znver3 -mtune=znver3 -mfma -mavx2 -mavx -mbmi2 -mf16c"
          export CXXFLAGS="$CFLAGS"

          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=ON \
            -DGGML_OPENMP=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DCMAKE_C_FLAGS="$CFLAGS" \
            -DCMAKE_CXX_FLAGS="$CXXFLAGS"

          cmake --build build -j$(nproc)

          # 바이너리 확인
          ls build/bin/

          cp build/bin/llama-cli /tmp/llama-5950x
          chmod +x /tmp/llama-5950x

      # -----------------------------
      # Build python binding
      # -----------------------------
      - name: Build llama-cpp-python (Zen3)
        run: |
          source /opt/rh/gcc-toolset-13/enable

          cd /tmp
          git clone https://github.com/abetlen/llama-cpp-python
          cd llama-cpp-python

          export CFLAGS="-O3 -march=znver3 -mtune=znver3 -mfma -mavx2 -mavx -mbmi2 -mf16c"
          export CXXFLAGS="$CFLAGS"

          CMAKE_ARGS="-DGGML_NATIVE=on" python3.11 -m pip wheel . --wheel-dir=/tmp/wheels --no-cache-dir

          ls -lh /tmp/wheels/

      # -----------------------------
      # Upload
      # -----------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-5950x-native
          path: |
            /tmp/llama-5950x
            /tmp/wheels/*.whl

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /tmp/llama-5950x
            /tmp/wheels/*.whl
          tag_name: ${{ github.ref_name }}
          name: llama.cpp Ryzen5950X Native - ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
