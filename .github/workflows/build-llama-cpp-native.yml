name: Build llama.cpp NATIVE (Rocky 8.10)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          dnf groupinstall "Development Tools" -y
          dnf install -y cmake git python3-pip python3-devel
      
      - name: Clone and build llama.cpp with NATIVE optimization
        run: |
          cd /tmp
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          make LLAMA_NATIVE=1 -j$(nproc)
          
          # Copy binary for upload
          cp ./main /tmp/llama-main-native-rocky8.10
          echo "Build complete: $(ls -lh /tmp/llama-main-native-rocky8.10)"
      
      - name: Build llama-cpp-python wheel
        run: |
          cd /tmp
          git clone https://github.com/abetlen/llama-cpp-python
          cd llama-cpp-python
          
          # Build with NATIVE optimization
          CMAKE_ARGS="-DLLAMA_NATIVE=on" pip3 install . --no-cache-dir -v
          
          # Create wheel
          pip3 wheel . --wheel-dir=/tmp/wheels --no-cache-dir
          
          echo "Wheel created:"
          ls -lh /tmp/wheels/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-native-rocky8.10
          path: |
            /tmp/llama-main-native-rocky8.10
            /tmp/wheels/*.whl
      
      - name: Create and Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /tmp/llama-main-native-rocky8.10
            /tmp/wheels/*.whl
          tag_name: ${{ github.ref_name }}
          name: llama.cpp NATIVE Build - ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
