name: Build llama.cpp Ryzen5950X (Rocky 8.10)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (enable powertools + gcc-toolset)
        run: |
          set -euxo pipefail

          dnf -y update
          dnf -y install dnf-plugins-core epel-release

          # Rocky 8: gcc-toolset은 보통 powertools가 필요합니다
          dnf config-manager --set-enabled powertools || true

          dnf -y groupinstall "Development Tools"
          dnf -y install cmake git make ninja-build

          # 최신 GCC toolset (Zen3/znver3 인식 및 최신 libstdc++)
          dnf -y install gcc-toolset-13 gcc-toolset-13-gcc gcc-toolset-13-gcc-c++ gcc-toolset-13-libstdc++-devel

          # Python 3.11
          dnf -y install python3.11 python3.11-devel python3.11-pip

      - name: Build llama.cpp (5950X znver3, NO GGML_NATIVE)
        run: |
          set -euxo pipefail

          # toolset 활성화 (이 상태에서 configure 해야 gcc 13으로 잡힘)
          source /opt/rh/gcc-toolset-13/enable

          # 반드시 toolset gcc/g++를 CMake에 고정
          export CC=/opt/rh/gcc-toolset-13/root/usr/bin/gcc
          export CXX=/opt/rh/gcc-toolset-13/root/usr/bin/g++

          # 5950X(Zen3) 전용 플래그 (CI CPU랑 무관하게 강제)
          export ARCHFLAGS="-O3 -march=znver3 -mtune=znver3 -mavx2 -mfma -mbmi2 -mf16c"
          export CFLAGS="$ARCHFLAGS"
          export CXXFLAGS="$ARCHFLAGS"

          cd /tmp
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_TOOLS=OFF \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_FLAGS="$CFLAGS" \
            -DCMAKE_CXX_FLAGS="$CXXFLAGS"

          cmake --build build -j$(nproc)

          # 타깃 바이너리 복사 (repo 버전에 따라 이름이 다를 수 있어 후보들 처리)
          if [ -f build/bin/llama-cli ]; then
            cp build/bin/llama-cli /tmp/llama-5950x
          elif [ -f build/bin/llama-main ]; then
            cp build/bin/llama-main /tmp/llama-5950x
          elif [ -f build/bin/main ]; then
            cp build/bin/main /tmp/llama-5950x
          else
            echo "ERROR: cannot find llama binary in build/bin"
            ls -al build/bin || true
            exit 1
          fi

          chmod +x /tmp/llama-5950x
          echo "Built:"
          /tmp/llama-5950x --help | head -n 5 || true
          ls -lh /tmp/llama-5950x

      - name: Build llama.cpp (5950X znver3, build CLI only)
        run: |
          set -euxo pipefail

          source /opt/rh/gcc-toolset-13/enable
          export CC=/opt/rh/gcc-toolset-13/root/usr/bin/gcc
          export CXX=/opt/rh/gcc-toolset-13/root/usr/bin/g++

          export ARCHFLAGS="-O3 -march=znver3 -mtune=znver3 -mavx2 -mfma -mbmi2 -mf16c"
          export CFLAGS="$ARCHFLAGS"
          export CXXFLAGS="$ARCHFLAGS"

          cd /tmp
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=ON \
            -DLLAMA_BUILD_EXAMPLES=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_FLAGS="$CFLAGS" \
            -DCMAKE_CXX_FLAGS="$CXXFLAGS"

          # repo 버전마다 타깃명이 달라서, 존재하는 걸 찾아서 빌드
          ninja -C build -t targets all | tee /tmp/llama_targets.txt

          if grep -qE '^llama-cli:' /tmp/llama_targets.txt; then
            cmake --build build -j$(nproc) --target llama-cli
          elif grep -qE '^llama-main:' /tmp/llama_targets.txt; then
            cmake --build build -j$(nproc) --target llama-main
          elif grep -qE '^main:' /tmp/llama_targets.txt; then
            cmake --build build -j$(nproc) --target main
          else
            echo "ERROR: No known CLI target found. Available targets (filtered):"
            grep -E 'llama|main|cli' /tmp/llama_targets.txt || true
            exit 1
          fi

          # 바이너리 경로도 버전별로 달라서 후보를 넓게 탐색
          echo "Searching for built executable..."
          find build -maxdepth 3 -type f -executable -name "llama-cli" -o -name "llama-main" -o -name "main" | tee /tmp/llama_bins.txt

          BIN="$(head -n 1 /tmp/llama_bins.txt || true)"
          if [ -z "$BIN" ]; then
            echo "ERROR: executable not found after build"
            find build -maxdepth 4 -type f -executable | head -n 50 || true
            exit 1
          fi

          cp "$BIN" /tmp/llama-5950x
          chmod +x /tmp/llama-5950x
          ls -lh /tmp/llama-5950x
          /tmp/llama-5950x --help | head -n 5 || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-5950x-rocky8
          path: |
            /tmp/llama-5950x
            /tmp/wheels/*.whl

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /tmp/llama-5950x
            /tmp/wheels/*.whl
          tag_name: ${{ github.ref_name }}
          name: llama.cpp 5950X Rocky8 - ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
