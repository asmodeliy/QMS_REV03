name: Build llama.cpp Ryzen5950X (Rocky 8.10)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  # Release 업로드에 필요

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (powertools + gcc-toolset-13 + Python 3.11)
        run: |
          set -euxo pipefail

          dnf -y update
          dnf -y install dnf-plugins-core epel-release
          dnf config-manager --set-enabled powertools || true

          dnf -y groupinstall "Development Tools"
          dnf -y install cmake git ninja-build make findutils which tar

          # GCC toolset (znver3 지원)
          dnf -y install gcc-toolset-13 gcc-toolset-13-gcc gcc-toolset-13-gcc-c++ gcc-toolset-13-libstdc++-devel

          # Python 3.11
          dnf -y install python3.11 python3.11-devel python3.11-pip

      - name: Build llama.cpp server (b2757, Ryzen 5950X znver3)
        run: |
          set -euxo pipefail

          source /opt/rh/gcc-toolset-13/enable
          export CC=/opt/rh/gcc-toolset-13/root/usr/bin/gcc
          export CXX=/opt/rh/gcc-toolset-13/root/usr/bin/g++

          export ARCHFLAGS="-O3 -march=znver3 -mtune=znver3 -mavx2 -mfma -mbmi2 -mf16c"
          export CFLAGS="$ARCHFLAGS"
          export CXXFLAGS="$ARCHFLAGS"

          mkdir -p /tmp/out

          cd /tmp
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          git checkout b2757

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=ON \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DCMAKE_C_COMPILER="$CC" \
            -DCMAKE_CXX_COMPILER="$CXX" \
            -DCMAKE_C_FLAGS="$CFLAGS" \
            -DCMAKE_CXX_FLAGS="$CXXFLAGS"

          cmake --build build -j$(nproc) --target server

          cp build/bin/server /tmp/out/llama-5950x
          chmod +x /tmp/out/llama-5950x

          echo "Built llama server:"
          ls -lh /tmp/out/llama-5950x
          /tmp/out/llama-5950x --help | head -n 10 || true

      - name: Build llama-cpp-python wheel (Ryzen 5950X znver3)
        run: |
          set -euxo pipefail

          source /opt/rh/gcc-toolset-13/enable
          export CC=/opt/rh/gcc-toolset-13/root/usr/bin/gcc
          export CXX=/opt/rh/gcc-toolset-13/root/usr/bin/g++

          ARCHFLAGS="-O3 -march=znver3 -mtune=znver3 -mavx2 -mfma -mbmi2 -mf16c"

          cd /tmp
          git clone --recursive https://github.com/abetlen/llama-cpp-python
          cd llama-cpp-python
          git submodule update --init --recursive

          python3.11 -m pip install --upgrade pip wheel setuptools

          export FORCE_CMAKE=1
          export CMAKE_ARGS="-DGGML_NATIVE=OFF -DGGML_OPENMP=ON \
            -DCMAKE_C_COMPILER=$CC -DCMAKE_CXX_COMPILER=$CXX \
            -DCMAKE_C_FLAGS='$ARCHFLAGS' -DCMAKE_CXX_FLAGS='$ARCHFLAGS'"

          mkdir -p /tmp/wheels
          python3.11 -m pip wheel . --wheel-dir=/tmp/wheels --no-cache-dir -v

          echo "Wheels:"
          ls -lh /tmp/wheels

          # Release 첨부용으로 out에 복사 (의존성 포함 그대로)
          cp /tmp/wheels/*.whl /tmp/out/
          ls -lh /tmp/out

      - name: Bundle outputs (optional)
        run: |
          set -euxo pipefail
          # 파일이 많아도 Release에 한 번에 올리기 쉽게 tgz로 묶어둠(원하면 사용)
          tar -C /tmp/out -czf /tmp/llama_5950x_bundle.tgz .
          ls -lh /tmp/llama_5950x_bundle.tgz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /tmp/out/*
            /tmp/llama_5950x_bundle.tgz
          tag_name: ${{ github.ref_name }}
          name: llama.cpp 5950X Rocky8 - ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
