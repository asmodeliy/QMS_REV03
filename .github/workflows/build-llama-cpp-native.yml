name: Build llama.cpp Ryzen5950X (Rocky 8.10)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8

    steps:
      - uses: actions/checkout@v4

      - name: Install deps (powertools + gcc-toolset-13 + Python 3.11)
        run: |
          set -euxo pipefail

          dnf -y update
          dnf -y install dnf-plugins-core epel-release
          dnf config-manager --set-enabled powertools || true

          dnf -y groupinstall "Development Tools"
          dnf -y install cmake git ninja-build make findutils which

          # GCC toolset (C++17 filesystem, znver3 support)
          dnf -y install gcc-toolset-13 gcc-toolset-13-gcc gcc-toolset-13-gcc-c++ gcc-toolset-13-libstdc++-devel

          # Python 3.11 for wheel build (optional)
          dnf -y install python3.11 python3.11-devel python3.11-pip

      - name: Build llama.cpp (Ryzen 5950X znver3) -> llama-server
        run: |
          set -euxo pipefail

          source /opt/rh/gcc-toolset-13/enable
          export CC=/opt/rh/gcc-toolset-13/root/usr/bin/gcc
          export CXX=/opt/rh/gcc-toolset-13/root/usr/bin/g++

          # Force Ryzen 5950X (Zen3) codegen in CI (do NOT use -march=native)
          export ARCHFLAGS="-O3 -march=znver3 -mtune=znver3 -mavx2 -mfma -mbmi2 -mf16c"
          export CFLAGS="$ARCHFLAGS"
          export CXXFLAGS="$ARCHFLAGS"

          cd /tmp
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          git checkout b2757

          cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DGGML_NATIVE=OFF \
          -DGGML_OPENMP=ON \
          -DLLAMA_BUILD_EXAMPLES=ON \
          -DCMAKE_C_COMPILER="$CC" \
          -DCMAKE_CXX_COMPILER="$CXX" \
          -DCMAKE_C_FLAGS="$CFLAGS" \
          -DCMAKE_CXX_FLAGS="$CXXFLAGS"

          cmake --build build -j$(nproc) --target server

          cp build/bin/server /tmp/llama-5950x
          chmod +x /tmp/llama-5950x

          echo "Built binary:"
          ls -lh /tmp/llama-5950x
          /tmp/llama-5950x --help | head -n 20 || true

      - name: Build llama-cpp-python wheel (Ryzen 5950X znver3)
        run: |
          set -euxo pipefail

          source /opt/rh/gcc-toolset-13/enable
          export CC=/opt/rh/gcc-toolset-13/root/usr/bin/gcc
          export CXX=/opt/rh/gcc-toolset-13/root/usr/bin/g++

          export ARCHFLAGS="-O3 -march=znver3 -mtune=znver3 -mavx2 -mfma -mbmi2 -mf16c"
          export CFLAGS="$ARCHFLAGS"
          export CXXFLAGS="$ARCHFLAGS"

          cd /tmp
          git clone https://github.com/abetlen/llama-cpp-python
          cd llama-cpp-python

          python3.11 -m pip install --upgrade pip wheel setuptools

          # Force CMake rebuild + enforce znver3 flags + disable GGML_NATIVE (CI CPU mismatch)
          export FORCE_CMAKE=1
          export CMAKE_ARGS="-DGGML_NATIVE=OFF -DGGML_OPENMP=ON -DCMAKE_C_COMPILER=$CC -DCMAKE_CXX_COMPILER=$CXX -DCMAKE_C_FLAGS=$CFLAGS -DCMAKE_CXX_FLAGS=$CXXFLAGS"

          mkdir -p /tmp/wheels
          python3.11 -m pip wheel . --wheel-dir=/tmp/wheels --no-cache-dir -v

          echo "Wheels:"
          ls -lh /tmp/wheels || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-5950x-rocky8
          path: |
            /tmp/llama-5950x
            /tmp/wheels/*.whl

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /tmp/llama-5950x
            /tmp/wheels/*.whl
          tag_name: ${{ github.ref_name }}
          name: llama.cpp 5950X Rocky8 - ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
