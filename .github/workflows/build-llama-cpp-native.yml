name: Build llama.cpp NATIVE (Rocky 8.10)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Build Cache (ccache)
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-
      
      - name: Install dependencies
        run: |
          dnf groupinstall "Development Tools" -y
          dnf install -y cmake git python3-pip python3-devel
          
          # ccache 설치 시도 (실패해도 계속 진행)
          dnf install -y epel-release && dnf install -y ccache || echo "ccache not available, continuing without cache"
          
          # Python 3.11 설치 (서버 환경에 맞춤)
          dnf install -y python3.11 python3.11-devel python3.11-pip
      
      - name: Clone and build llama.cpp with NATIVE optimization
        env:
          CCACHE_DIR: ~/.ccache
          CCACHE_MAXSIZE: 2G
          CXXFLAGS: "-march=native -lstdc++ -lstdc++fs"
          LDFLAGS: "-lstdc++ -lstdc++fs"
        run: |
          ccache -z  # 통계 초기화
          cd /tmp
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          
          # CMake으로 빌드 (NATIVE 최적화 활성화)
          mkdir -p build
          cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLAMA_NATIVE=ON \
            -DGGML_NATIVE=ON \
            -DGGML_CCACHE=ON \
            -DCMAKE_CXX_STANDARD=17 \
            -DCMAKE_CXX_STANDARD_REQUIRED=ON \
            -DCMAKE_C_FLAGS="-march=native" \
            -DCMAKE_CXX_FLAGS_INIT="-march=native -lstdc++ -lstdc++fs" \
            -DCMAKE_CXX_FLAGS="-march=native -lstdc++ -lstdc++fs" \
            -DCMAKE_SHARED_LINKER_FLAGS="-lstdc++ -lstdc++fs -Wl,--as-needed" \
            -DCMAKE_MODULE_LINKER_FLAGS="-lstdc++ -lstdc++fs" \
            -DCMAKE_EXE_LINKER_FLAGS="-lstdc++ -lstdc++fs -Wl,--copy-dt-needed-entries"
          
          cmake --build . --config Release -j$(nproc) 2>&1 | tee build.log || {
            echo "Main build failed, trying without examples..."
            # 다시 시도: examples 제외
            cd ..
            rm -rf build
            mkdir build
            cd build
            cmake .. \
              -DCMAKE_BUILD_TYPE=Release \
              -DLLAMA_NATIVE=ON \
              -DGGML_NATIVE=ON \
              -DGGML_CCACHE=ON \
              -DCMAKE_CXX_STANDARD=17 \
              -DCMAKE_CXX_STANDARD_REQUIRED=ON \
              -DCMAKE_C_FLAGS="-march=native" \
              -DCMAKE_CXX_FLAGS_INIT="-march=native -lstdc++ -lstdc++fs" \
              -DCMAKE_CXX_FLAGS="-march=native -lstdc++ -lstdc++fs" \
              -DCMAKE_SHARED_LINKER_FLAGS="-lstdc++ -lstdc++fs -Wl,--as-needed" \
              -DCMAKE_EXE_LINKER_FLAGS="-lstdc++ -lstdc++fs -Wl,--copy-dt-needed-entries"
            
            cmake --build . --config Release -j$(nproc) --target llama-main
          }
          
          # 바이너리 복사
          if [ -f bin/llama-main ]; then
            cp bin/llama-main /tmp/llama-main-native-rocky8
          elif [ -f llama-main ]; then
            cp llama-main /tmp/llama-main-native-rocky8
          else
            echo "ERROR: llama-main binary not found!"
            find . -name "llama-main" 2>/dev/null || echo "No llama-main found"
            exit 1
          fi
          
          chmod +x /tmp/llama-main-native-rocky8
          echo "Build complete:"
          ls -lh /tmp/llama-main-native-rocky8
          
          # ccache 통계
          echo ""
          echo "=== ccache 통계 ==="
          ccache -s
      
      - name: Build llama-cpp-python wheel
        run: |
          cd /tmp
          git clone https://github.com/abetlen/llama-cpp-python
          cd llama-cpp-python
          
          # Python 3.11로 wheel 빌드 (서버 환경 맞춤)
          CMAKE_ARGS="-DLLAMA_NATIVE=on" python3.11 -m pip install . --no-cache-dir -v
          
          # Python 3.11 wheel 생성
          python3.11 -m pip wheel . --wheel-dir=/tmp/wheels --no-cache-dir
          
          echo "Wheel created (Python 3.11):"
          ls -lh /tmp/wheels/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: llama-cpp-native-rocky8
          path: |
            /tmp/llama-main-native-rocky8
            /tmp/wheels/*.whl
      
      - name: Create and Upload Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            /tmp/llama-main-native-rocky8
            /tmp/wheels/*.whl
          tag_name: ${{ github.ref_name }}
          name: llama.cpp NATIVE Build - ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
