{% extends "base.html" %}
{% block content %}
<main class="container pi-root">
  <header class="module-titlebar pi-titlebar" aria-label="Product info empty header">
    <div class="module-titletop">
      <div class="module-titleblock">
        <p class="module-kicker">PRODUCT MATRIX</p>
        <h1 class="module-title">{{ t('product_info.missing_table_title', locale) }}</h1>
        <p class="module-subtitle">{{ t('product_info.missing_table_subtitle', locale) }}</p>
      </div>
      <div class="header-actions">
        <a href="/product-info" class="pi-btn pi-btn-secondary">{{ t('product_info.back_to_list', locale) }}</a>
      </div>
    </div>
    <div class="module-titleline" aria-hidden="true"></div>
  </header>
  <section class="pi-empty">
    <div class="pi-empty-card">
      <p class="pi-empty-title">테이블 데이터가 없습니다</p>
    </div>
  </section>
</main>
{% endblock %}
