{% extends "base.html" %}
{% block content %}
<main class="container spec-center-root viewer">
  <header class="module-titlebar spec-titlebar" aria-label="Spec viewer header">
    <div class="module-titleblock">
      <p class="module-kicker">DOCUMENT PREVIEW</p>
      <h1 class="module-title">Spec Viewer</h1>
    </div>
    <div class="module-titleline" aria-hidden="true"></div>
  </header>
  <h2>{{ filename }}</h2>
  <div id="docx-status" class="spec-docx-status">Loading document...</div>
  <div id="docx-container" class="docx-content spec-docx-container">
  </div>
</main>

<script src="https://unpkg.com/mammoth@1.5.1/dist/mammoth.browser.min.js"></script>
<script>
(async function(){
  const filename = {{ filename | tojson }};
  const url = '/spec-center/serve/' + encodeURIComponent(filename);
  const status = document.getElementById('docx-status');
  try{
    console.log('docx viewer checking size via HEAD', url);
    const head = await fetch(url, {method: 'HEAD'});
    console.log('HEAD response', head.status);
    if(head.ok){
      const len = head.headers.get('content-length');
      if(len && Number(len) > 5 * 1024 * 1024){
        status.textContent = 'File too large for in-browser viewing (>' + Math.round(Number(len)/1024/1024) + 'MB). Ask an admin to convert it to PDF.';
        throw new Error('file too large');
      }
    }
    console.log('docx viewer fetching', url);
    const resp = await fetch(url);
    console.log('docx viewer response', resp.status, resp.ok);
    if(!resp.ok) throw new Error('fetch failed: ' + resp.status);
    const ab = await resp.arrayBuffer();
    status.textContent = 'Converting document for viewing...';
    const result = await mammoth.convertToHtml({arrayBuffer: ab});
    document.getElementById('docx-container').innerHTML = result.value;
    status.style.display = 'none';
  }catch(err){
    status.textContent = 'Viewing is not available for this file on the server. Ask an admin to convert it to PDF for in-browser viewing.';
    console.error('docx viewer error', err);
    try{
      const fallback = '/uploads/spec_center/' + encodeURIComponent(filename);
      console.log('docx viewer fallback fetch', fallback);
      const r2 = await fetch(fallback);
      console.log('fallback response', r2.status, r2.ok);
    }catch(e){ console.error('fallback error', e); }
  }
})();
</script>

{% endblock %}
