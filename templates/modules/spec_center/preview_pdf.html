{% extends "base.html" %}
{% block content %}
<main class="container spec-center-root viewer">
  <header class="module-titlebar spec-titlebar" aria-label="Spec viewer header">
    <div class="module-titleblock">
      <p class="module-kicker">DOCUMENT PREVIEW</p>
      <h1 class="module-title">Spec Viewer</h1>
      <p class="module-subtitle">Preview (read-only)</p>
    </div>
    <div class="module-titleline" aria-hidden="true"></div>
  </header>
  <h2>{{ filename }}</h2>
  <div class="spec-preview-row">
    <div class="spec-preview-main">
      <div id="pdf-viewer" class="spec-preview-viewer"></div>
      <div class="spec-preview-controls">
        <button id="prevBtn" class="btn btn-ghost btn-sm">◀ Prev</button>
        <span id="pageInfo"></span>
        <button id="nextBtn" class="btn btn-ghost btn-sm">Next ▶</button>
      </div>
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
const url = "/uploads/spec_center/{{ filename }}";
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
const container = document.getElementById('pdf-viewer');
(async ()=>{
  const pdf = await pdfjsLib.getDocument({url}).promise;
  let currentPage = 1;
  const totalPages = pdf.numPages;
  const renderPage = async (pageNum)=>{
    container.innerHTML = '';
    const page = await pdf.getPage(pageNum);
    const viewport = page.getViewport({scale:1.2});
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width; canvas.height = viewport.height;
    container.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    await page.render({canvasContext:ctx, viewport}).promise;
    document.getElementById('pageInfo').textContent = `${pageNum} / ${totalPages}`;
  };

  document.getElementById('prevBtn').addEventListener('click', ()=>{ if(currentPage>1){ currentPage--; renderPage(currentPage); }});
  document.getElementById('nextBtn').addEventListener('click', ()=>{ if(currentPage<totalPages){ currentPage++; renderPage(currentPage); }});

  await renderPage(currentPage);
})();
</script>
{% endblock %}
