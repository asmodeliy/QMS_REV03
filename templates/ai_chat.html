<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMS AI Assistant</title>
    <link rel="stylesheet" href="/static/shared.css?v=20260213b" />
</head>
<body class="ai-chat ai-chat-floating">
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="status-dot"></div>
                <h2>QMS AI</h2>
            </div>
            
            <div class="quick-actions">
                <h3 class="quick-title">빠른 질문</h3>
                <button class="quick-btn" onclick="sendQuickMessage('최근 프로젝트 목록을 보여주세요')">📋 최근 프로젝트</button>
                <button class="quick-btn" onclick="sendQuickMessage('활성화된 작업들이 뭐가 있어?')">✅ 활성 작업</button>
                <button class="quick-btn" onclick="sendQuickMessage('QMS 시스템 구조는?')">🏗️ 시스템 구조</button>
                <button class="quick-btn" onclick="sendQuickMessage('현재 사용자 정보를 알려줘')">👤 사용자 정보</button>
            </div>
            
            <div class="sidebar-spacer"></div>
            
            <button class="quick-btn quick-btn-danger" onclick="resetChat()">
                🔄 대화 초기화
            </button>
        </div>
        
        <div class="chat-section">
            <div class="main-chat">
                <div class="chat-header">
                    <h1>QMS AI Assistant</h1>
                    <div class="chat-header-actions">
                        <button class="icon-btn" title="새로고침" onclick="location.reload()">🔄</button>
                        <button class="icon-btn" title="설정" onclick="alert('설정 기능은 곧 제공됩니다')">⚙️</button>
                    </div>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        <div class="message-content">
                            안녕하세요! 저는 QMS AI 어시스턴트입니다. 🤖<br><br>
                            프로젝트, 작업, 사용자 정보에 대해 물어보거나, QMS 시스템의 구조와 기능에 대해 질문해주세요.<br><br>
                            어떻게 도와드릴까요?
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <div class="stats is-hidden" id="statsContainer">
                        <div class="stat-item">⏱️ <span id="responseTime">-</span>ms</div>
                        <div class="stat-item">📊 모델: Llama-3 8B</div>
                    </div>
                    
                    <div class="input-container">
                        <textarea 
                            id="messageInput" 
                            placeholder="메시지를 입력하세요... (Ctrl/Cmd+Enter 또는 아래 버튼으로 전송, Shift+Enter로 줄바꿈)"
                            onkeypress="handleKeyPress(event)" 
                        ></textarea>
                        <button id="sendBtn" onclick="sendMessage()">전송</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/gpt4all';
        let isLoading = false;
        let conversationStart = Date.now();
        
        const messageInput = document.getElementById('messageInput');
        const chatMessages = document.getElementById('chatMessages');
        const sendBtn = document.getElementById('sendBtn');
        const statsContainer = document.getElementById('statsContainer');
        
        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
        });
        
        function addMessage(content, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (!isUser && content === 'loading') {
                contentDiv.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            } else {
                // Escape HTML special characters first
                content = content
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
                
                // Apply markdown-like formatting
                content = content
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/__(.*?)__/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/_(.*?)_/g, '<em>$1</em>')
                    .replace(/`(.*?)`/g, '<code class="inline-code">$1</code>')
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/\n/g, '<br>');
                
                contentDiv.innerHTML = content;
            }
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function setLoading(loading) {
            isLoading = loading;
            sendBtn.disabled = loading;
            messageInput.disabled = loading;
            
            if (loading) {
                sendBtn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            } else {
                sendBtn.textContent = '전송';
            }
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;
            
            addMessage(message, true);
            messageInput.value = '';
            messageInput.style.height = '50px';
            
            setLoading(true);
            const startTime = Date.now();
            
            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        reset: false
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }
                
                const data = await response.json();
                const responseTime = Date.now() - startTime;
                
                addMessage(data.response, false);
                
                // Show stats
                document.getElementById('responseTime').textContent = responseTime;
                statsContainer.classList.remove('is-hidden');
                
            } catch (error) {
                console.error('Error:', error);
                addMessage(`❌ 오류: ${error.message}`, false);
            } finally {
                setLoading(false);
            }
        }
        
        function sendQuickMessage(msg) {
            messageInput.value = msg;
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
            sendMessage();
        }
        
        async function resetChat() {
            if (!confirm('대화 기록을 초기화하시겠습니까?')) return;
            
            try {
                await fetch(`${API_BASE}/reset`, { method: 'POST' });
                chatMessages.innerHTML = `
                    <div class="message assistant">
                        <div class="message-content">
                            대화가 초기화되었습니다. 새로운 질문을 해주세요! 😊
                        </div>
                    </div>
                `;
                statsContainer.style.display = 'none';
            } catch (error) {
                alert('초기화 중 오류가 발생했습니다.');
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
