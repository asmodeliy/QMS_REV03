<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMS AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --secondary: #f093fb;
            --success: #4ade80;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }
        
        .app-container {
            display: flex;
            height: 100vh;
        }
        
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }
        
        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }
        
        .sidebar-header h2 {
            font-size: 18px;
            margin: 0;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .quick-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
        }
        
        .quick-btn {
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: all 0.2s;
        }
        
        .quick-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .chat-section {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--surface);
        }
        
        .chat-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header h1 {
            font-size: 20px;
            margin: 0;
        }
        
        .chat-header-actions {
            display: flex;
            gap: 8px;
        }
        
        .icon-btn {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: none;
            background: var(--bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            transition: all 0.2s;
        }
        
        .icon-btn:hover {
            background: var(--border);
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 28px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.assistant {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 85%;
            padding: 16px 20px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 15px;
            word-wrap: break-word;
            white-space: pre-wrap;
            overflow-wrap: break-word;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 12px 4px 12px 12px;
        }
        
        .message.assistant .message-content {
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px 12px 12px 12px;
        }
        
        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }
        
        .loading-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: bounce 1.4s infinite;
        }
        
        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes bounce {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }
        
        .chat-input-area {
            padding: 20px;
            border-top: 1px solid var(--border);
            background: var(--surface);
        }
        
        .input-container {
            display: flex;
            gap: 8px;
        }
        
        #messageInput {
            flex: 1;
            padding: 14px 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            max-height: 160px;
            line-height: 1.6;
            transition: border-color 0.2s;
        }
        
        #messageInput:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        #sendBtn {
            padding: 12px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #sendBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        #sendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .stats {
            padding: 12px 16px;
            background: var(--bg);
            border-radius: 8px;
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .model-status {
            padding: 12px 16px;
            background: var(--success);
            color: white;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .error-message {
            padding: 12px 16px;
            background: var(--danger);
            color: white;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 12px;
        }
        
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .message-content {
                max-width: 85%;
            }
            
            .chat-header {
                padding: 16px;
            }
            
            .chat-messages {
                padding: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="status-dot"></div>
                <h2>QMS AI</h2>
            </div>
            
            <div class="quick-actions">
                <h3 style="font-size: 12px; text-transform: uppercase; color: var(--text-light); margin-bottom: 8px;">빠른 질문</h3>
                <button class="quick-btn" onclick="sendQuickMessage('최근 프로젝트 목록을 보여주세요')">📋 최근 프로젝트</button>
                <button class="quick-btn" onclick="sendQuickMessage('활성화된 작업들이 뭐가 있어?')">✅ 활성 작업</button>
                <button class="quick-btn" onclick="sendQuickMessage('QMS 시스템 구조는?')">🏗️ 시스템 구조</button>
                <button class="quick-btn" onclick="sendQuickMessage('현재 사용자 정보를 알려줘')">👤 사용자 정보</button>
            </div>
            
            <div style="flex: 1;"></div>
            
            <button class="quick-btn" style="background: var(--danger); color: white; border-color: var(--danger);" onclick="resetChat()">
                🔄 대화 초기화
            </button>
        </div>
        
        <div class="chat-section">
            <div class="main-chat">
                <div class="chat-header">
                    <h1>QMS AI Assistant</h1>
                    <div class="chat-header-actions">
                        <button class="icon-btn" title="새로고침" onclick="location.reload()">🔄</button>
                        <button class="icon-btn" title="설정" onclick="alert('설정 기능은 곧 제공됩니다')">⚙️</button>
                    </div>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        <div class="message-content">
                            안녕하세요! 저는 QMS AI 어시스턴트입니다. 🤖<br><br>
                            프로젝트, 작업, 사용자 정보에 대해 물어보거나, QMS 시스템의 구조와 기능에 대해 질문해주세요.<br><br>
                            어떻게 도와드릴까요?
                        </div>
                    </div>
                </div>
                
                <div class="chat-input-area">
                    <div class="stats" id="statsContainer" style="display: none;">
                        <div class="stat-item">⏱️ <span id="responseTime">-</span>ms</div>
                        <div class="stat-item">📊 모델: Llama-3 8B</div>
                    </div>
                    
                    <div class="input-container">
                        <textarea 
                            id="messageInput" 
                            placeholder="메시지를 입력하세요... (Ctrl/Cmd+Enter 또는 아래 버튼으로 전송, Shift+Enter로 줄바꿈)"
                            onkeypress="handleKeyPress(event)" 
                            style="height: 50px;"
                        ></textarea>
                        <button id="sendBtn" onclick="sendMessage()">전송</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/gpt4all';
        let isLoading = false;
        let conversationStart = Date.now();
        
        const messageInput = document.getElementById('messageInput');
        const chatMessages = document.getElementById('chatMessages');
        const sendBtn = document.getElementById('sendBtn');
        const statsContainer = document.getElementById('statsContainer');
        
        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 160) + 'px';
        });
        
        function addMessage(content, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            if (!isUser && content === 'loading') {
                contentDiv.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            } else {
                // Escape HTML special characters first
                content = content
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;')
                    .replace(/'/g, '&#039;');
                
                // Apply markdown-like formatting
                content = content
                    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                    .replace(/__(.*?)__/g, '<strong>$1</strong>')
                    .replace(/\*(.*?)\*/g, '<em>$1</em>')
                    .replace(/_(.*?)_/g, '<em>$1</em>')
                    .replace(/`(.*?)`/g, '<code style="background: rgba(0,0,0,0.1); padding: 2px 6px; border-radius: 3px; font-family: monospace;">$1</code>')
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/\n/g, '<br>');
                
                contentDiv.innerHTML = content;
            }
            
            messageDiv.appendChild(contentDiv);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        function setLoading(loading) {
            isLoading = loading;
            sendBtn.disabled = loading;
            messageInput.disabled = loading;
            
            if (loading) {
                sendBtn.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>';
            } else {
                sendBtn.textContent = '전송';
            }
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;
            
            addMessage(message, true);
            messageInput.value = '';
            messageInput.style.height = '50px';
            
            setLoading(true);
            const startTime = Date.now();
            
            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        reset: false
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Error: ${response.status}`);
                }
                
                const data = await response.json();
                const responseTime = Date.now() - startTime;
                
                addMessage(data.response, false);
                
                // Show stats
                document.getElementById('responseTime').textContent = responseTime;
                statsContainer.style.display = 'flex';
                
            } catch (error) {
                console.error('Error:', error);
                addMessage(`❌ 오류: ${error.message}`, false);
            } finally {
                setLoading(false);
            }
        }
        
        function sendQuickMessage(msg) {
            messageInput.value = msg;
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
            sendMessage();
        }
        
        async function resetChat() {
            if (!confirm('대화 기록을 초기화하시겠습니까?')) return;
            
            try {
                await fetch(`${API_BASE}/reset`, { method: 'POST' });
                chatMessages.innerHTML = `
                    <div class="message assistant">
                        <div class="message-content">
                            대화가 초기화되었습니다. 새로운 질문을 해주세요! 😊
                        </div>
                    </div>
                `;
                statsContainer.style.display = 'none';
            } catch (error) {
                alert('초기화 중 오류가 발생했습니다.');
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
        
        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
