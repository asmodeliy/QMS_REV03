<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Browser - RAMSCHIP QMS</title>
    <link rel="stylesheet" href="/static/db_browser/style.css">
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --dark: #1f2937;
            --light: #f3f4f6;
            --border: #e5e7eb;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--light);
            color: var(--dark);
        }

        .db-browser-container {
            display: flex;
            height: 100vh;
            background: white;
        }

        .db-sidebar {
            width: 280px;
            background: var(--dark);
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 2px solid var(--primary);
            overflow-y: auto;
        }

        .db-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
        }

        .db-header h2 {
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .db-database-selector {
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .db-database-selector label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            display: block;
            margin-bottom: 8px;
        }

        .db-database-selector select {
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        .db-tables-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .db-tables-list h3 {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 10px;
        }

        .db-table-item {
            padding: 8px 12px;
            margin: 4px 0;
            background: rgba(255, 255, 255, 0.05);
            border-left: 3px solid transparent;
            cursor: pointer;
            border-radius: 3px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .db-table-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-left-color: var(--primary);
            padding-left: 15px;
        }

        .db-table-item.active {
            background: var(--primary);
            border-left-color: var(--success);
            font-weight: 600;
        }

        .db-main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .db-toolbar {
            display: flex;
            gap: 15px;
            align-items: center;
            padding: 15px 20px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .db-search-box {
            flex: 1;
            min-width: 250px;
            display: flex;
            gap: 5px;
        }

        .db-search-box input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
        }

        .db-controls {
            display: flex;
            gap: 10px;
        }

        .db-btn {
            padding: 10px 16px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .db-btn:hover {
            background: var(--light);
            border-color: var(--primary);
            color: var(--primary);
        }

        .db-btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .db-btn-primary:hover {
            background: #1d4ed8;
            border-color: #1d4ed8;
        }

        .db-table-info {
            padding: 15px 20px;
            background: white;
            border-bottom: 1px solid var(--border);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .db-info-item {
            padding: 10px;
            background: var(--light);
            border-radius: 4px;
        }

        .db-info-label {
            font-size: 0.8rem;
            color: #6b7280;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .db-info-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary);
        }

        .db-data-container {
            flex: 1;
            overflow: auto;
            background: white;
            margin: 0 20px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .db-data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .db-data-table thead {
            background: #f3f4f6;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .db-data-table th {
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid var(--border);
            color: var(--dark);
            white-space: nowrap;
        }

        .db-data-table td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
            color: #4b5563;
        }

        .db-data-table tbody tr:hover {
            background: #f9fafb;
        }

        .db-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 15px 20px;
            background: white;
            border-top: 1px solid var(--border);
        }

        .db-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .db-modal.active {
            display: flex;
        }

        .db-modal-content {
            background: white;
            border-radius: 8px;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.15);
        }

        .db-modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .db-modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .db-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #6b7280;
        }

        .db-form-group {
            margin-bottom: 15px;
        }

        .db-form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: var(--dark);
        }

        .db-form-group input,
        .db-form-group select,
        .db-form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 0.9rem;
            font-family: inherit;
        }

        .db-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
            overflow-y: auto;
        }

        .db-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 15px;
            transition: all 0.2s;
        }

        .db-card:hover {
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.1);
        }

        .db-card-title {
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .db-card-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid var(--light);
            font-size: 0.9rem;
        }

        .db-card-row:last-child {
            border-bottom: none;
        }

        .db-badge {
            display: inline-block;
            padding: 4px 8px;
            background: #dbeafe;
            color: #1e40af;
            border-radius: 3px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .db-tabs {
            display: none;
        }

        @media (max-width: 1024px) {
            .db-browser-container {
                flex-direction: column;
            }

            .db-sidebar {
                width: 100%;
                max-height: 25%;
            }

            .db-main-content {
                max-height: 75%;
            }
        }
    </style>
</head>
<body>
    <div class="db-browser-container">
        <div class="db-sidebar">
            <div class="db-header">
                <h2>🗄️ DB Browser</h2>
            </div>
            
            <div class="db-database-selector">
                <label>데이터베이스:</label>
                <select id="dbSelect" onchange="loadTables()">
                    <option value="">선택...</option>
                </select>
            </div>

            <div class="db-tables-list">
                <h3>테이블</h3>
                <div id="tablesList"></div>
            </div>
        </div>

        <div class="db-main-content">
            <div class="db-toolbar">
                <div class="db-search-box">
                    <input type="text" id="searchInput" placeholder="검색..." onkeyup="performSearch()">
                    <button onclick="performSearch()">🔍</button>
                </div>
                <div class="db-controls">
                    <button class="db-btn db-btn-primary" onclick="addRowModal()">➕ 새 레코드</button>
                    <button class="db-btn" onclick="refreshData()">🔄 새로고침</button>
                </div>
            </div>

            <div id="tableInfo" class="db-table-info"></div>

            <div class="db-data-container">
                <table class="db-data-table" id="dataTable">
                    <thead></thead>
                    <tbody></tbody>
                </table>
            </div>

            <div class="db-pagination">
                <button onclick="previousPage()" class="db-btn">◀ 이전</button>
                <span id="pageInfo"></span>
                <button onclick="nextPage()" class="db-btn">다음 ▶</button>
            </div>
        </div>
    </div>

    <div id="editModal" class="db-modal">
        <div class="db-modal-content">
            <div class="db-modal-header">
                <h3 id="editModalTitle">레코드 편집</h3>
                <button class="db-close" onclick="closeEditModal()">✕</button>
            </div>
            <div class="db-modal-body" id="editModalBody"></div>
            <div class="db-modal-footer">
                <button class="db-btn" onclick="closeEditModal()">취소</button>
                <button class="db-btn db-btn-primary" onclick="saveRow()">저장</button>
            </div>
        </div>
    </div>

    <div id="addRowModal" class="db-modal">
        <div class="db-modal-content">
            <div class="db-modal-header">
                <h3>새 레코드 추가</h3>
                <button class="db-close" onclick="closeAddRowModal()">✕</button>
            </div>
            <div class="db-modal-body" id="addRowModalBody"></div>
            <div class="db-modal-footer">
                <button class="db-btn" onclick="closeAddRowModal()">취소</button>
                <button class="db-btn db-btn-primary" onclick="insertRow()">추가</button>
            </div>
        </div>
    </div>

    <script src="/static/db_browser/script.js"></script>
</body>
</html>
